name: Test Python

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python
        env:
          GARMIN_MAPSHARE_PASSWORD: ${{ secrets.GARMIN_MAPSHARE_PASSWORD }}
        run: python scripts/update_garmin.py