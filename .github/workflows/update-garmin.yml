name: Update Garmin Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: garmin-tracker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Garmin KML
        env:
          GARMIN_KML_URL: ${{ secrets.GARMIN_KML_URL }}
        run: |
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 3 \
            --user-agent "Mozilla/5.0" \
            --header "Accept: application/vnd.google-earth.kml+xml,application/xml,text/xml,*/*" \
            "$GARMIN_KML_URL" \
            -o feed.kml

          test -s feed.kml
          grep -qi "<kml" feed.kml

      - name: Update tracker
        run: |
          python scripts/update_garmin.py \
            --kml feed.kml \
            --race race.json \
            --course course.json

      - name: Commit changes
        run: |
          rm -f feed.kml

          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add race.json course.json
          git commit -m "Automatic Garmin update"
          git push
