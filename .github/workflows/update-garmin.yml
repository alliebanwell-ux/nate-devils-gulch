name: Update Garmin tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest Garmin point
        env:
          GARMIN_MAPSHARE_ID: EP9H4
          GARMIN_MAPSHARE_PASSWORD: ${{ secrets.GARMIN_MAPSHARE_PASSWORD }}
        run: python scripts/update_garmin.py

      - name: Commit tracker updates
        run: |
          if git diff --quiet -- race.json course.json; then
            echo "No new Garmin point."
            exit 0
          fi
          git config user.name "garmin-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add race.json course.json
          git commit -m "Update Garmin tracker"
          git push
