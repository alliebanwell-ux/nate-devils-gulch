name: Update Garmin Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Garmin KML
        run: |
          curl -L \
            -A "Mozilla/5.0" \
            "${{ secrets.GARMIN_KML_URL }}" \
            -o feed.kml

          test -s feed.kml

      - name: Update tracker
        run: |
          python scripts/update_garmin.py \
            --kml feed.kml \
            --race race.json \
            --course course.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git add race.json course.json
          git commit -m "Automatic Garmin update"
          git push
